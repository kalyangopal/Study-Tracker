<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Study Tracker</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Excel -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>


<style>
body {
    font-family: Arial;
    padding: 20px;
}

h1 {
    text-align: center;
    text-decoration: underline;
}

form {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
}

textarea {
    width: 250px;
    height: 80px;
}

button {
    padding: 6px 10px;
    margin: 5px;
    cursor: pointer;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th, td {
    border: 1px solid black;
    padding: 8px;
    text-align: center;
}
</style>
</head>

<body>

<h1>Daily Study Tracker</h1>

<form>
    <input type="date" id="date">
    <input type="text" id="sno" placeholder="S.No">
    <input type="text" id="task" placeholder="Task">
    <input type="time" id="start">
    <input type="time" id="stop">
    <textarea id="comments" placeholder="Comments"></textarea>
</form>

<div style="text-align:center;">
    <button onclick="addTask()">Submit</button>
    <button onclick="exportToExcel()">Export Excel</button>
    
</div>

<h2>Records</h2>

<table id="table">
<thead>
<tr>
    <th>Date</th>
    <th>S.No</th>
    <th>Task</th>
    <th>Start</th>
    <th>Stop</th>
    <th>Hours</th>
    <th>Comments</th>
    <th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h2>Study Graph</h2>
<canvas id="chart"></canvas>

<script>
let tableBody = document.querySelector("#table tbody");
let chart;
let hoursData = [];
let labels = [];

// ADD TASK
function addTask() {
    let date = document.getElementById("date").value;
    let sno = document.getElementById("sno").value;
    let task = document.getElementById("task").value;
    let start = document.getElementById("start").value;
    let stop = document.getElementById("stop").value;
    let comments = document.getElementById("comments").value;

    if (!date || !sno || !task || !start || !stop) {
        alert("Fill all fields");
        return;
    }

    let startTime = new Date(`1970-01-01T${start}:00`);
    let stopTime = new Date(`1970-01-01T${stop}:00`);
    let hours = (stopTime - startTime) / (1000 * 60 * 60);

    let row = document.createElement("tr");

    row.innerHTML = `
        <td>${date}</td>
        <td>${sno}</td>
        <td>${task}</td>
        <td>${start}</td>
        <td>${stop}</td>
        <td>${hours.toFixed(2)}</td>
        <td>${comments}</td>
        <td><button onclick="deleteRow(this)">Delete</button></td>
    `;

    tableBody.appendChild(row);

    // Graph data
    hoursData.push(hours);
    labels.push(date + " - " + task);
    updateChart();

    // Clear inputs
    document.getElementById("date").value = "";
    document.getElementById("sno").value = "";
    document.getElementById("task").value = "";
    document.getElementById("start").value = "";
    document.getElementById("stop").value = "";
    document.getElementById("comments").value = "";
}

// DELETE
function deleteRow(btn) {
    btn.parentElement.parentElement.remove();
}

// CHART
function updateChart() {
    let ctx = document.getElementById("chart").getContext("2d");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Study Hours",
                data: hoursData
            }]
        }
    });
}

// EXPORT EXCEL
function exportToExcel() {
    let table = document.getElementById("table");
    let wb = XLSX.utils.table_to_book(table, { sheet: "Study Data" });
    XLSX.writeFile(wb, "Study_Tracker.xlsx");
}


</script>

</body>
</html>
